<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Scheduler</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding-bottom:80px;
}

.contact-box{
background:#0d3b66;
color:white;
text-align:center;
padding:15px;
}

.admin-bar{
text-align:center;
margin:10px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin:10px;
}

.header{
background:#1976d2;
color:white;
text-align:center;
padding:6px;
}

.day{
background:white;
min-height:70px;
padding:6px;
border-radius:6px;
box-shadow:0 1px 3px rgba(0,0,0,.2);
cursor:pointer;
}

.day.free{background:#e8f5e9;}
.day.partial{background:#fff3cd;}
.day.full{background:#ffebee;}

.slots{
font-size:11px;
margin-top:5px;
}

.modal{
display:none;
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
max-height:80vh;
overflow:auto;
padding:15px;
box-shadow:0 -4px 10px rgba(0,0,0,.3);
z-index:9999;
}

button{
margin-left:5px;
}

.banner{
text-align:center;
padding:15px;
}

.banner img{
max-width:500px;
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<div class="contact-box">
<strong>📞 Contact / Booking</strong><br>
WhatsApp / Viber: +63 917 630 5244
</div>

<div class="admin-bar" id="adminBar"></div>

Year <select id="yearSelect"></select>
Month <select id="monthSelect"></select>

<div class="calendar" id="calendar"></div>

<div class="banner">
<img src="Parking Ad.jpg">
</div>

<div class="modal" id="modal">

<h3 id="selectedDate"></h3>

<div id="slots"></div>

<button onclick="closeModal()">Close</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */

firebase.initializeApp({
apiKey:"AIzaSyD3XfycRBSa2t52IFw4bnX3uhYtCY",
authDomain:"parking-system-j07.firebaseapp.com",
projectId:"parking-system-j07"
});

const db=firebase.firestore();

/* GLOBALS */

let bookings={}
let selectedDate=""
let isAdmin=false

const calendar=document.getElementById("calendar")
const modal=document.getElementById("modal")
const slots=document.getElementById("slots")
const selectedDateText=document.getElementById("selectedDate")

const yearSelect=document.getElementById("yearSelect")
const monthSelect=document.getElementById("monthSelect")

/* ADMIN */

function updateAdmin(){

document.getElementById("adminBar").innerHTML=

isAdmin
? `<button onclick="logout()">Exit Admin</button>`
: `<button onclick="login()">Admin Login</button>`

}

function login(){

if(prompt("Password")==="admin123"){
isAdmin=true
updateAdmin()
}

}

function logout(){

isAdmin=false
updateAdmin()

}

updateAdmin()

/* YEAR MONTH */

for(let y=2024;y<=2030;y++){
yearSelect.innerHTML+=`<option value="${y}">${y}</option>`
}

const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

months.forEach((m,i)=>{
monthSelect.innerHTML+=`<option value="${i}">${m}</option>`
})

const now=new Date()

yearSelect.value=now.getFullYear()
monthSelect.value=now.getMonth()

/* REALTIME DATA */

db.collection("bookings").onSnapshot(snapshot=>{

bookings={}

snapshot.forEach(doc=>{

const parts=doc.id.split("-")

const date=parts[0]+"-"+parts[1]+"-"+parts[2]
const hour=parseInt(parts[3])

if(!bookings[date]) bookings[date]=[]

bookings[date].push(hour)

})

renderCalendar()

})

/* CALENDAR */

function renderCalendar(){

calendar.innerHTML=""

const y=parseInt(yearSelect.value)
const m=parseInt(monthSelect.value)

const firstDay=new Date(y,m,1).getDay()
const days=new Date(y,m+1,0).getDate()

const headers=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

headers.forEach(h=>{
calendar.innerHTML+=`<div class="header">${h}</div>`
})

for(let i=0;i<firstDay;i++){
calendar.innerHTML+=`<div></div>`
}

for(let d=1;d<=days;d++){

const dateKey=`${y}-${m}-${d}`

const hours=bookings[dateKey]||[]

let status="free"

if(hours.length===24) status="full"
else if(hours.length>0) status="partial"

calendar.innerHTML+=`

<div class="day ${status}" onclick="openDay('${dateKey}')">

<strong>${d}</strong>

<div class="slots">

${24-hours.length} hrs free

</div>

</div>

`

}

}

/* OPEN DAY */

function openDay(date){

selectedDate=date

modal.style.display="block"

selectedDateText.innerText="Date "+date

renderSlots()

}

function closeModal(){
modal.style.display="none"
}

/* SLOTS */

function renderSlots(){

slots.innerHTML=""

const hours=bookings[selectedDate]||[]

for(let h=0;h<24;h++){

const booked=hours.includes(h)

slots.innerHTML+=`

<div>

${h}:00 - ${h+1}:00

${
booked
? (isAdmin
? `<span style="color:red">Booked</span>
<button onclick="freeSlot(${h})">Free</button>`
: `<span style="color:red">Booked</span>`)
: (isAdmin
? `<span style="color:green">Available</span>
<button onclick="bookSlot(${h})">Book</button>`
: `<span style="color:green">Available</span>`)
}

</div>

`

}

}

/* BOOK */

function bookSlot(hour){

const id=selectedDate+"-"+hour

if(!bookings[selectedDate]) bookings[selectedDate]=[]

if(bookings[selectedDate].includes(hour)){
alert("Already booked")
return
}

/* UI update */

bookings[selectedDate].push(hour)

renderSlots()
renderCalendar()

/* DATABASE */

db.collection("bookings").doc(id).set({})

}

/* FREE */

function freeSlot(hour){

const id=selectedDate+"-"+hour

bookings[selectedDate]=bookings[selectedDate].filter(h=>h!==hour)

renderSlots()
renderCalendar()

db.collection("bookings").doc(id).delete()

}

/* EVENTS */

yearSelect.onchange=renderCalendar
monthSelect.onchange=renderCalendar

renderCalendar()

</script>

</body>
</html>
