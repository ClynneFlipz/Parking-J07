<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Scheduler</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0;padding-bottom:80px;}

.contact-box{
background:#0d3b66;
color:white;
text-align:center;
padding:15px;
font-size:16px;
}

.admin-bar{text-align:center;margin:10px;}
.admin-bar button{padding:8px 12px;}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
margin:10px;
}

.header{
background:#1976d2;
color:white;
text-align:center;
padding:6px;
font-size:13px;
border-radius:4px;
}

.day{
background:white;
min-height:70px;
padding:6px;
font-size:14px;
border-radius:6px;
box-shadow:0 1px 3px rgba(0,0,0,.1);
cursor:pointer;
}

.day.free{background:#e8f5e9;}
.day.partial{background:#fff3cd;}
.day.full{background:#ffebee;}

.slots{font-size:11px;margin-top:4px;}

.modal{
display:none;
position:fixed;
bottom:0;
left:0;
width:100%;
max-height:80vh;
overflow-y:auto;
background:white;
padding:15px;
border-radius:16px 16px 0 0;
box-shadow:0 -4px 10px rgba(0,0,0,.3);
}

.banner{text-align:center;padding:15px;}
.banner img{max-width:500px;width:100%;border-radius:10px;}

.floating-book-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff6b00;
color:white;
padding:14px 18px;
font-size:16px;
font-weight:bold;
border-radius:50px;
text-decoration:none;
box-shadow:0 4px 12px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<div class="contact-box">
<strong>📞 Contact / Booking</strong><br>
WhatsApp / Viber: +63 917 630 5244<br>
Facebook: 
<a href="https://www.facebook.com/ClaiRe0725" target="_blank" style="color:#ffd166;">
facebook.com/ClaiRe0725
</a>
</div>

<div class="admin-bar" id="adminBar"></div>

Year:
<select id="yearSelect"></select>

Month:
<select id="monthSelect"></select>

<div class="calendar" id="calendar"></div>

<div class="banner">
<img src="Parking Ad.jpg">
</div>

<div class="modal" id="bookingModal">
<h3 id="selectedDate"></h3>
<div id="timeSlots"></div>
<button onclick="closeModal()">Close</button>
</div>

<a href="https://www.facebook.com/ClaiRe0725" target="_blank" class="floating-book-btn">BOOK NOW</a>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */

firebase.initializeApp({
apiKey:"AIzaSyD3XfycRBSa2t52IFw4bnX3uhYtCY",
authDomain:"parking-system-j07.firebaseapp.com",
projectId:"parking-system-j07"
});

const db=firebase.firestore();

/* ELEMENTS */

const calendar=document.getElementById("calendar");
const yearSelect=document.getElementById("yearSelect");
const monthSelect=document.getElementById("monthSelect");
const modal=document.getElementById("bookingModal");
const selectedDateText=document.getElementById("selectedDate");
const timeSlotsDiv=document.getElementById("timeSlots");
const adminBar=document.getElementById("adminBar");

let selectedDate="";
let isAdmin=false;
const ADMIN_PASS="admin123";

let bookings={};

/* ADMIN */

function updateAdminBar(){
adminBar.innerHTML=isAdmin
? `<button onclick="logoutAdmin()">Exit Admin</button>`
: `<button onclick="adminLogin()">Admin Login</button>`;
}

function adminLogin(){
if(prompt("Password")==ADMIN_PASS){
isAdmin=true;
updateAdminBar();
}
}

function logoutAdmin(){
isAdmin=false;
updateAdminBar();
}

updateAdminBar();

/* YEAR + MONTH */

for(let y=2024;y<=2030;y++){
yearSelect.innerHTML+=`<option value="${y}">${y}</option>`;
}

["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
.forEach((m,i)=>{
monthSelect.innerHTML+=`<option value="${i}">${m}</option>`;
});

const now=new Date();
yearSelect.value=now.getFullYear();
monthSelect.value=now.getMonth();

/* REALTIME BOOKINGS */

db.collection("bookings").onSnapshot(snap=>{

bookings={};

snap.forEach(doc=>{

const parts=doc.id.split("-");
const date=parts[0]+"-"+parts[1]+"-"+parts[2];
const hour=parseInt(parts[3]);

if(!bookings[date]) bookings[date]=[];

bookings[date].push(hour);

});

renderCalendar();

});

/* CALENDAR */

function renderCalendar(){

calendar.innerHTML="";

const y=parseInt(yearSelect.value);
const m=parseInt(monthSelect.value);

const firstDay=new Date(y,m,1).getDay();
const daysInMonth=new Date(y,m+1,0).getDate();

["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
.forEach(d=>calendar.innerHTML+=`<div class="header">${d}</div>`);

for(let i=0;i<firstDay;i++){
calendar.innerHTML+=`<div></div>`;
}

for(let d=1;d<=daysInMonth;d++){

const dateKey=`${y}-${m}-${d}`;

const hours=bookings[dateKey]||[];

let status="free";

if(hours.length===24) status="full";
else if(hours.length>0) status="partial";

const available=24-hours.length;

calendar.innerHTML+=`
<div class="day ${status}" onclick="openBooking('${dateKey}')">
<strong>${d}</strong>
<div class="slots">
${available} hrs available
</div>
</div>
`;
}

}

/* MODAL */

function openBooking(date){

selectedDate=date;

const p=date.split("-");

selectedDateText.innerText=`Date: ${p[0]}-${parseInt(p[1])+1}-${p[2]}`;

modal.style.display="block";

loadTimeSlots();

}

function closeModal(){
modal.style.display="none";
}

/* TIME SLOTS */

function loadTimeSlots(){

timeSlotsDiv.innerHTML="";

const hours=bookings[selectedDate]||[];

for(let h=0;h<24;h++){

const booked=hours.includes(h);

timeSlotsDiv.innerHTML+=`
<div>
${h}:00-${h+1}:00
${
booked
? (isAdmin
? `<span style="color:red">Booked</span>
<button onclick="event.stopPropagation(); removeSlot(${h})">Free</button>`
: `<span style="color:red">Booked</span>`
)
: (isAdmin
? `<span style="color:green">Available</span>
<button onclick="event.stopPropagation(); bookSlot(${h})">Book</button>`
: `<span style="color:green">Available</span>`
)
}
</div>
`;
}

}

/* BOOK */

function bookSlot(h){

const key=selectedDate+"-"+h;

db.collection("bookings").doc(key).get().then(doc=>{

if(doc.exists){
alert("Already booked.");
return;
}

db.collection("bookings").doc(key).set({});

});

}

/* FREE */

function removeSlot(h){

db.collection("bookings").doc(selectedDate+"-"+h).delete();

}

/* EVENTS */

yearSelect.onchange=renderCalendar;
monthSelect.onchange=renderCalendar;

renderCalendar();

</script>

</body>
</html>
